 dop_law_english_parliament_desc: "Parliament is the de facto successor of the #italic Magnum Concilium#!, and a major pillar of the government. Parliament's primary function is to check the power of the ruler by requiring mandatory consultation on taxation and legislation, preventing absolute rule."
